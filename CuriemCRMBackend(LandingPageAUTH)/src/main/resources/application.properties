spring.application.name=CuriemCRM

# Thymeleaf: project may ship views separately; avoid startup failure when classpath:/templates/ is empty
spring.thymeleaf.check-template-location=false

#database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/curiem_crm
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show_sql=true

# JWT (use a long random secret in production; HS256 needs >= 256 bits for some validators)
jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
jwt.expiration-ms=86400000

# MVC admin login: use BCrypt hash in production (60 chars, $2a$...). Plain text still works for local dev (legacy check).
# Generate: inject PasswordMatchService or BCryptPasswordEncoder.encode("yourPassword")
app.admin.email=admin@gmail.com
app.admin.password=admin123

spring.devtools.restart.enabled=false